<text x="54" y="66.0"><tspan fill="#10B981" font-weight="bold">- HACKATHONS</tspan><tspan fill="#475569"> -——————————————————————————————————————————————————————————————————————————————————-</tspan></text>
<text x="54" y="100.1"><tspan fill="#475569">. </tspan><tspan fill="#22D3EE" font-weight="bold">Team</tspan><tspan fill="#475569">: </tspan><tspan fill="#E5E7EB">Daria-Ioana Drăghici, Sebastian Ioniță, Adrian Barbu</tspan></text>
<text x="54" y="122.1"><tspan fill="#475569">. </tspan><tspan fill="#22D3EE" font-weight="bold">Built</tspan><tspan fill="#475569">: </tspan><tspan fill="#E5E7EB">KangooFit - AI fitness app</tspan></text>
<text x="54" y="156.2"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">Our very first hackathon - and it exceeded every expectation. Constant brainstorming, spontaneous decision-</tspan></text>
<text x="54" y="178.2"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">making, and supporting each other under pressure while genuinely enjoying every one of those 24 intense</tspan></text>
<text x="54" y="200.2"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">hours.</tspan></text>
<text x="54" y="234.3"><tspan fill="#475569">. </tspan><tspan fill="#10B981">- </tspan><tspan fill="#dbeafe">Real-time exercise form detection via on-device AI and the phone camera</tspan></text>
<text x="54" y="256.3"><tspan fill="#475569">. </tspan><tspan fill="#10B981">- </tspan><tspan fill="#dbeafe">Rep counting and live feedback during workouts</tspan></text>
<text x="54" y="278.3"><tspan fill="#475569">. </tspan><tspan fill="#10B981">- </tspan><tspan fill="#dbeafe">Wear OS integration for activity and heart-rate tracking</tspan></text>
<text x="54" y="300.3"><tspan fill="#475569">. </tspan><tspan fill="#10B981">- </tspan><tspan fill="#dbeafe">A virtual kangaroo companion that evolves with your activity, for gamified motivation</tspan></text>
<text x="54" y="322.3"><tspan fill="#475569">. </tspan><tspan fill="#10B981">- </tspan><tspan fill="#dbeafe">All AI processing runs on-device - low latency, smooth performance, better privacy</tspan></text>
<text x="54" y="356.4"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">Proof that teamwork, adaptability, and communication can take a project remarkably far in a very short</tspan></text>
<text x="54" y="378.4"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">amount of time.</tspan></text>
</svg>
