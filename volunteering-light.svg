  <text x="600" y="24" text-anchor="middle" class="term-label">dariadraghici ~ % ./lsac --activity</text>
  <rect x="1037.4" y="12" width="14" height="14" rx="3" fill="none" stroke="#059669" stroke-width="1.4"/>
  <text x="1166" y="23" text-anchor="end" class="tag">VOLUNTEER.LOG</text>
</g>

<text x="34" y="66.0"><tspan fill="#059669" font-weight="bold">- VOLUNTEERING &amp; COMMUNITY</tspan><tspan fill="#94A3B8"> -————————————————————————————————————————————————————————————————————-</tspan></text>
<text x="34" y="104.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#0284C7" font-weight="bold">Role</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#1E293B">Marketing &amp; Public Relations Manager</tspan></text>
<text x="34" y="129.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#0284C7" font-weight="bold">Org</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#1E293B">LSAC Bucuresti</tspan></text>
<text x="34" y="154.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#0284C7" font-weight="bold">Period</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#1E293B">Jul 2025 - Jul 2026</tspan></text>
<text x="34" y="193.5"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">PR Coordinator for Perpetuum, an engineering hackathon built around Rube-Goldberg-style chain reactions</tspan></text>
<text x="34" y="218.5"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">using Arduino systems. Owned the full PR workflow end to end: promotional strategy, visual and written</tspan></text>
<text x="34" y="243.5"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">materials, and a volunteer team assigned by strength.</tspan></text>
<text x="34" y="282.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">Worked under tight deadlines alongside the logistics, technical, Multimedia, Design, FundRaising, and HR</tspan></text>
<text x="34" y="307.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">departments, translating a complex technical competition into a narrative students could easily connect with</tspan></text>
<text x="34" y="332.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">- strengthening organizational leadership, clear communication under pressure, and confident ownership of</tspan></text>
<text x="34" y="357.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">responsibility.</tspan></text>
<text x="34" y="396.0"><tspan fill="#94A3B8">. </tspan><tspan fill="#0284C7" font-weight="bold">Role</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#1E293B">Public Relations Department Volunteer</tspan></text>
<text x="34" y="421.0"><tspan fill="#94A3B8">. </tspan><tspan fill="#0284C7" font-weight="bold">Org</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#1E293B">LSAC Bucuresti</tspan></text>
<text x="34" y="446.0"><tspan fill="#94A3B8">. </tspan><tspan fill="#0284C7" font-weight="bold">Period</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#1E293B">Oct 2024 - present</tspan></text>
<text x="34" y="484.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">Promotes the association across social platforms and offline initiatives; volunteered at hackathons such as</tspan></text>
<text x="34" y="509.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">Perpetuum and HackItAll, the IT&amp;C job fair, and student events - building public speaking, coordination, and</tspan></text>
<text x="34" y="534.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">multi-stakeholder collaboration skills.</tspan></text>

<rect x="0" y="0" width="100%" height="70" fill="url(#scanGrad)" opacity="0.8" style="mix-blend-mode:multiply">
    <animateTransform attributeName="transform" type="translate"
      values="0 -70; 0 -70; 0 -70; 0 656; 0 656; 0 656"
      keyTimes="0.0000; 0.5748; 0.5749; 0.7662; 0.7663; 1.0000"
      dur="15.0s" repeatCount="indefinite"/>
  </rect>
