<text x="34" y="66.0"><tspan fill="#059669" font-weight="bold">- ABOUT</tspan><tspan fill="#94A3B8"> -———————————————————————————————————————————————————————————————————————————————————————-</tspan></text>
<text x="34" y="104.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">Computer Engineering student at the Faculty of Automatic Control and Computer Science (UNSTPB), with strong</tspan></text>
<text x="34" y="129.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">interests in systems programming, software engineering, Machine Learning, AI-driven technologies, and mobile</tspan></text>
<text x="34" y="154.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">development.</tspan></text>
<text x="34" y="193.5"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">I enjoy solving complex technical problems and building efficient, scalable applications, while continuously</tspan></text>
<text x="34" y="218.5"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">deepening my understanding of low-level systems, algorithms, and real-time computing.</tspan></text>
<text x="34" y="257.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">Alongside my academic work, I&#x27;m actively involved in teaching, mentoring, hackathons, and student tech</tspan></text>
<text x="34" y="282.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">communities through PR and event organization activities.</tspan></text>

