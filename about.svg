<text x="54" y="66.0"><tspan fill="#10B981" font-weight="bold">- ABOUT</tspan><tspan fill="#475569"> -———————————————————————————————————————————————————————————————————————————————————————-</tspan></text>
<text x="54" y="100.1"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">Computer Engineering student at the Faculty of Automatic Control and Computer Science (UNSTPB), with strong</tspan></text>
<text x="54" y="122.1"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">interests in systems programming, software engineering, Machine Learning, AI-driven technologies, and mobile</tspan></text>
<text x="54" y="144.1"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">development.</tspan></text>
<text x="54" y="178.2"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">I enjoy solving complex technical problems and building efficient, scalable applications, while continuously</tspan></text>
<text x="54" y="200.2"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">deepening my understanding of low-level systems, algorithms, and real-time computing.</tspan></text>
<text x="54" y="234.3"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">Alongside my academic work, I&#x27;m actively involved in teaching, mentoring, hackathons, and student tech</tspan></text>
