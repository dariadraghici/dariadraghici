<text x="54" y="66.0"><tspan fill="#10B981" font-weight="bold">- VOLUNTEERING &amp; COMMUNITY</tspan><tspan fill="#475569"> -————————————————————————————————————————————————————————————————————-</tspan></text>
<text x="54" y="100.1"><tspan fill="#475569">. </tspan><tspan fill="#22D3EE" font-weight="bold">Role</tspan><tspan fill="#475569">: </tspan><tspan fill="#E5E7EB">Marketing &amp; Public Relations Manager</tspan></text>
<text x="54" y="122.1"><tspan fill="#475569">. </tspan><tspan fill="#22D3EE" font-weight="bold">Org</tspan><tspan fill="#475569">: </tspan><tspan fill="#E5E7EB">LSAC Bucuresti</tspan></text>
<text x="54" y="144.1"><tspan fill="#475569">. </tspan><tspan fill="#22D3EE" font-weight="bold">Period</tspan><tspan fill="#475569">: </tspan><tspan fill="#E5E7EB">Jul 2025 - Jul 2026</tspan></text>
<text x="54" y="178.2"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">PR Coordinator for Perpetuum, an engineering hackathon built around Rube-Goldberg-style chain reactions</tspan></text>
<text x="54" y="200.2"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">using Arduino systems. Owned the full PR workflow end to end: promotional strategy, visual and written</tspan></text>
<text x="54" y="222.2"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">materials, and a volunteer team assigned by strength.</tspan></text>
<text x="54" y="256.3"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">Worked under tight deadlines alongside the logistics, technical, Multimedia, Design, FundRaising, and HR</tspan></text>
<text x="54" y="278.3"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">departments, translating a complex technical competition into a narrative students could easily connect with</tspan></text>
<text x="54" y="300.3"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">- strengthening organizational leadership, clear communication under pressure, and confident ownership of</tspan></text>
<text x="54" y="322.3"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">responsibility.</tspan></text>
<text x="54" y="356.4"><tspan fill="#475569">. </tspan><tspan fill="#22D3EE" font-weight="bold">Role</tspan><tspan fill="#475569">: </tspan><tspan fill="#E5E7EB">Public Relations Department Volunteer</tspan></text>
<text x="54" y="378.4"><tspan fill="#475569">. </tspan><tspan fill="#22D3EE" font-weight="bold">Org</tspan><tspan fill="#475569">: </tspan><tspan fill="#E5E7EB">LSAC Bucuresti</tspan></text>
<text x="54" y="400.4"><tspan fill="#475569">. </tspan><tspan fill="#22D3EE" font-weight="bold">Period</tspan><tspan fill="#475569">: </tspan><tspan fill="#E5E7EB">Oct 2024 - present</tspan></text>
<text x="54" y="434.5"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">Promotes the association across social platforms and offline initiatives; volunteered at hackathons such as</tspan></text>
<text x="54" y="456.5"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">Perpetuum and HackItAll, the IT&amp;C job fair, and student events - building public speaking, coordination, and</tspan></text>
<text x="54" y="478.5"><tspan fill="#475569">. </tspan><tspan fill="#dbeafe">multi-stakeholder collaboration skills.</tspan></text>
</svg>
