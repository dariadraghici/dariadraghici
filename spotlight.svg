  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="30%" cy="15%" r="90%">
    <stop offset="0%" stop-color="#0B1120"/>
    <stop offset="100%" stop-color="#050816"/>
  </radialGradient>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#7DD3FC" opacity="0.05"/>
  </pattern>
  <style>
    text { font-family: 'Courier New', Consolas, monospace; font-size: 13px; white-space: pre; }
    .term-label { font-family: 'Courier New', Consolas, monospace; font-size: 11px; fill: #64748B; letter-spacing: 0.5px; }
    .tag { font-family: 'Courier New', Consolas, monospace; font-size: 9px; fill: #38BDF8; letter-spacing: 2px; opacity: 0.85; }
  </style>
</defs>

<rect width="1200" height="426" rx="16" fill="url(#bgGlow)"/>
<rect width="1200" height="426" rx="16" fill="url(#scanlines)"/>
<rect x="2" y="2" width="1196" height="422" rx="15" fill="none" stroke="url(#borderGrad)" stroke-width="1.6" opacity="0.85"/>

<g>
  <rect x="2" y="2" width="1196" height="36" rx="15" fill="#0B1120" fill-opacity="0.85"/>
  <rect x="2" y="28" width="1196" height="8" fill="#0B1120" fill-opacity="0.85"/>
  <circle cx="24" cy="19" r="5" fill="#EF4444"/>
  <circle cx="42" cy="19" r="5" fill="#F59E0B"/>
  <circle cx="60" cy="19" r="5" fill="#10B981"/>
