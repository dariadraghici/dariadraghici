<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="472" viewBox="0 0 1200 472">
<defs>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#0EA5E9"/>
    <stop offset="100%" stop-color="#059669"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="30%" cy="15%" r="90%">
    <stop offset="0%" stop-color="#F8FAFC"/>
    <stop offset="100%" stop-color="#E2E8F0"/>
  </radialGradient>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#334155" opacity="0.05"/>
  </pattern>
  <style>
    text { font-family: 'Courier New', Consolas, monospace; font-size: 15px; white-space: pre; }
    .term-label { font-family: 'Courier New', Consolas, monospace; font-size: 12px; fill: #64748B; letter-spacing: 0.5px; }
    .tag { font-family: 'Courier New', Consolas, monospace; font-size: 10px; fill: #0284C7; letter-spacing: 2px; opacity: 0.85; }
  </style>
</defs>

<rect width="1200" height="472" rx="16" fill="url(#bgGlow)"/>
<rect width="1200" height="472" rx="16" fill="url(#scanlines)"/>
<rect x="2" y="2" width="1196" height="468" rx="15" fill="none" stroke="url(#borderGrad)" stroke-width="1.6" opacity="0.85"/>

<g>
  <rect x="2" y="2" width="1196" height="36" rx="15" fill="#FFFFFF" fill-opacity="0.9"/>
  <rect x="2" y="28" width="1196" height="8" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="24" cy="19" r="5" fill="#F87171"/>
  <circle cx="42" cy="19" r="5" fill="#FBBF24"/>
  <circle cx="60" cy="19" r="5" fill="#34D399"/>
  <text x="600" y="24" text-anchor="middle" class="term-label">dariadraghici ~ % ./hackathons --latest</text>
  <rect x="1116" y="12" width="14" height="14" rx="3" fill="none" stroke="#059669" stroke-width="1.4"/>
  <text x="1136" y="23" class="tag">SPOTLIGHT.EVENT</text>
</g>

<text x="34" y="66.0"><tspan fill="#059669" font-weight="bold">- HACKATHONS</tspan><tspan fill="#94A3B8"> -——————————————————————————————————————————————————————————————————————————————————-</tspan></text>
<text x="34" y="104.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#0284C7" font-weight="bold">Team</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#1E293B">Daria-Ioana Drăghici, Sebastian Ioniță, Adrian Barbu</tspan></text>
<text x="34" y="129.8"><tspan fill="#94A3B8">. </tspan><tspan fill="#0284C7" font-weight="bold">Built</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#1E293B">KangooFit - AI fitness app</tspan></text>
<text x="34" y="168.5"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">Our very first hackathon - and it exceeded every expectation. Constant brainstorming, spontaneous decision-</tspan></text>
<text x="34" y="193.5"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">making, and supporting each other under pressure while genuinely enjoying every one of those 24 intense</tspan></text>
<text x="34" y="218.5"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">hours.</tspan></text>
<text x="34" y="257.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#059669">- </tspan><tspan fill="#1E293B">Real-time exercise form detection via on-device AI and the phone camera</tspan></text>
<text x="34" y="282.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#059669">- </tspan><tspan fill="#1E293B">Rep counting and live feedback during workouts</tspan></text>
<text x="34" y="307.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#059669">- </tspan><tspan fill="#1E293B">Wear OS integration for activity and heart-rate tracking</tspan></text>
<text x="34" y="332.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#059669">- </tspan><tspan fill="#1E293B">A virtual kangaroo companion that evolves with your activity, for gamified motivation</tspan></text>
<text x="34" y="357.2"><tspan fill="#94A3B8">. </tspan><tspan fill="#059669">- </tspan><tspan fill="#1E293B">All AI processing runs on-device - low latency, smooth performance, better privacy</tspan></text>
<text x="34" y="396.0"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">Proof that teamwork, adaptability, and communication can take a project remarkably far in a very short</tspan></text>
<text x="34" y="421.0"><tspan fill="#94A3B8">. </tspan><tspan fill="#1E293B">amount of time.</tspan></text>
</svg>
